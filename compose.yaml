name: media-engine-dev

x-node-dev-service: &node-dev-service
  image: node:24-bookworm-slim
  user: "${UID:-1000}:${GID:-1000}"
  working_dir: /workspace
  volumes:
    - .:/workspace

services:
  api:
    <<: *node-dev-service
    ports:
      - "${MEDIA_ENGINE_COMPOSE_BIND_ADDRESS:-0.0.0.0}:3000:3000"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      MEDIA_ENGINE_RATE_LIMIT_WINDOW_MS: ${MEDIA_ENGINE_RATE_LIMIT_WINDOW_MS:-60000}
      MEDIA_ENGINE_RATE_LIMIT_MAX_REQUESTS: ${MEDIA_ENGINE_RATE_LIMIT_MAX_REQUESTS:-60}
      MEDIA_ENGINE_STREAMING_PROVIDER_TIMEOUT_MS: ${MEDIA_ENGINE_STREAMING_PROVIDER_TIMEOUT_MS:-10000}
      MEDIA_ENGINE_FLIXHQ_STREAMING_PROVIDER_TIMEOUT_MS: ${MEDIA_ENGINE_FLIXHQ_STREAMING_PROVIDER_TIMEOUT_MS:-15000}
    command: npm --prefix apps/api run start:dev
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  example:
    <<: *node-dev-service
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MEDIA_ENGINE_COMPOSE_BIND_ADDRESS:-0.0.0.0}:5173:5173"
    environment:
      VITE_MEDIA_ENGINE_API_URL: http://127.0.0.1:3000
    command: npm --prefix apps/example run dev -- --host 0.0.0.0
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:5173').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
