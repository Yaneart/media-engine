name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    name: Release check (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        node: [24, 26]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run complete deterministic release gate
        run: pnpm release:check

  minimum-node:
    name: Public package compatibility (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up build Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build public packages
        run: |
          pnpm --filter @media-engine/core build
          pnpm --filter @media-engine/providers build
          pnpm --filter @media-engine/sdk build

      - name: Set up minimum supported Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test core package
        working-directory: packages/core
        run: node ../../scripts/run-node-tests.mjs

      - name: Test providers package
        working-directory: packages/providers
        run: node ../../scripts/run-node-tests.mjs

      - name: Test SDK package
        working-directory: packages/sdk
        run: node ../../scripts/run-node-tests.mjs
